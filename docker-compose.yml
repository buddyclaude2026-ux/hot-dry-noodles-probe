services:
  heihei-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heihei-core
    restart: always
    working_dir: /app
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      - PORT=${PORT:-8081}
      - AGENT_TOKEN=${AGENT_TOKEN:-}
      - ADMIN_TOKEN=${ADMIN_TOKEN:-}

  heihei-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: heihei-agent
    restart: always
    working_dir: /app
    network_mode: "host"
    volumes:
      - .:/app
      - /:/host/root:ro
      - /etc/os-release:/host/etc/os-release:ro
    command: python3 web/agent.py --server http://localhost:8081/api/v1/report --db-path /app/heihei.db --name 'MyServer'
